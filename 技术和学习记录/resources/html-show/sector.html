<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬盘扇区（Sector）可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
h1 { text-align: center; font-size: 24px; margin-bottom: 6px; color: #f0f6fc; }
.subtitle { text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; }
.card h2 { font-size: 16px; color: #f0f6fc; margin-bottom: 10px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
svg { width: 100%; height: auto; display: block; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; font-size: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-item .box { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.info { margin-top: 12px; font-size: 13px; line-height: 1.6; color: #c9d1d9; min-height: 48px; }
.info .hl { color: #58a6ff; font-weight: 600; }
.full-width { max-width: 1400px; margin: 20px auto 0; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-phy { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
.badge-log { background: #d2992222; color: #d29922; border: 1px solid #d2992244; }
.badge-blk { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }

/* Hover effects */
.hover-arc, .hover-segment, .hover-box, .hover-line, .hover-ring { cursor: pointer; }
.hover-arc:hover { filter: url(#glow); }
.hover-segment:hover { filter: url(#glow); }
.hover-box:hover { filter: url(#glow); }
.hover-line:hover { stroke: #3fb950 !important; stroke-width: 2 !important; }
.hover-ring:hover { stroke: #f0883e !important; stroke-width: 2 !important; }

#tooltip {
  position: fixed; background: #1f2937; border: 1px solid #30363d; border-radius: 8px;
  padding: 10px 14px; font-size: 12px; line-height: 1.5; color: #c9d1d9;
  pointer-events: none; z-index: 1000; max-width: 280px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5); display: none;
}
#tooltip .tt-hl { color: #58a6ff; font-weight: 600; }
#tooltip .tt-label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>硬盘扇区（Sector）可视化</h1>
<p class="subtitle">物理扇区 × 逻辑扇区 × 扇区内部结构 · 鼠标悬停查看详情</p>

<div class="grid">
  <div class="card">
    <h2>❶ 盘面物理布局</h2>
    <svg viewBox="0 0 500 500" id="platterSvg">
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feComposite in="SourceGraphic" in2="b" operator="over"/>
        </filter>
      </defs>
    </svg>
    <div class="legend">
      <span class="legend-item"><span class="box" style="background:#58a6ff;"></span> 扇区</span>
      <span class="legend-item"><span class="box" style="background:transparent;border:1.5px dashed #f0883e;"></span> 磁道</span>
      <span class="legend-item"><span class="box" style="background:#3fb950;"></span> 伺服楔</span>
    </div>
    <div class="info" id="platterInfo">鼠标悬浮到扇区/磁道/伺服楔上查看详情</div>
  </div>
  <div class="card">
    <h2>❷ 扇区内部结构</h2>
    <svg viewBox="0 0 500 120" id="sectorDetailSvg"></svg>
    <div class="info" id="sectorInfo" style="margin-top:4px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;">
        <div><span class="badge badge-phy">Preamble</span> 同步时钟</div>
        <div><span class="badge badge-phy">Sector Mark</span> 扇区号标识</div>
        <div><span class="badge badge-log">Data</span> 用户数据 (512B / 4KB)</div>
        <div><span class="badge badge-blk">ECC</span> 纠错码</div>
        <div><span class="badge badge-blk">Gap</span> 扇区间隙</div>
        <div><span style="color:#8b949e;">合计</span> ~4.5KB (4K AF)</div>
      </div>
    </div>
  </div>
</div>

<div class="full-width card">
  <h2>❸ I/O 路径：扇区 → 块 → 页</h2>
  <svg viewBox="0 0 1200 180" id="pathSvg"></svg>
  <div class="info" style="text-align:center;">
    从磁盘到应用：<span class="hl">sector</span> → <span class="hl">bio</span> → <span class="hl">block</span> → <span class="hl">page</span> → <span class="hl">read()</span>
  </div>
</div>

<div id="tooltip"></div>

<script>
(function() {
'use strict';

const CX = 250, CY = 250, OR = 200, IR = 60;

function qs(id) { return document.getElementById(id); }
const platterSvg = qs('platterSvg');
const detailSvg = qs('sectorDetailSvg');
const pathSvg = qs('pathSvg');
const platterInfo = qs('platterInfo');

// ---- Tooltip ----
const tt = qs('tooltip');
function tip(e, html) {
  tt.innerHTML = html;
  tt.style.display = 'block';
  const pad = 15;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + tt.offsetWidth > innerWidth - 10) x = e.clientX - tt.offsetWidth - pad;
  if (y + tt.offsetHeight > innerHeight - 10) y = e.clientY - tt.offsetHeight - pad;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTip() { tt.style.display = 'none'; }
function bindTip(el, html) {
  el.addEventListener('mouseenter', e => tip(e, html));
  el.addEventListener('mousemove', e => tip(e, html));
  el.addEventListener('mouseleave', hideTip);
}

function SVG(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

// ---- Platter ----
function drawPlatter() {
  const g = SVG('g');
  const bg = SVG('circle', {cx: CX, cy: CY, r: OR, fill: '#0d1117', stroke: '#30363d', 'stroke-width': '1'});
  g.appendChild(bg);

  // Servo wedges
  for (let i = 0; i < 72; i++) {
    const a = (i / 72) * Math.PI * 2 - Math.PI / 2;
    const ln = SVG('line', {
      x1: CX + Math.cos(a) * IR, y1: CY + Math.sin(a) * IR,
      x2: CX + Math.cos(a) * OR, y2: CY + Math.sin(a) * OR,
      stroke: '#3fb95044', 'stroke-width': '1', class: 'hover-line'
    });
    bindTip(ln, `<div class="tt-label">伺服楔 #${i}</div>
<div style="font-size:11px;line-height:1.5;">
出厂写入的永久磁标记，每隔 5° 一条。<br>
用于磁头闭环定位，包含 Gray Code 磁道号和 Burst 调校信号。</div>`);
    g.appendChild(ln);
  }

  // Tracks
  const tracks = [];
  const trackCount = 14;
  for (let t = 1; t <= trackCount; t++) {
    const r = IR + (OR - IR) * (t / trackCount);
    tracks.push(r);
    const c = SVG('circle', {
      cx: CX, cy: CY, r: r, fill: 'none',
      stroke: '#f0883e33', 'stroke-width': '1',
      'stroke-dasharray': '3,4', class: 'hover-ring'
    });
    bindTip(c, `<div class="tt-label">磁道 #${t}</div>
半径 ${r.toFixed(0)}px（示意）<br>ZBR 下外圈磁道扇区密度不变但周长大，扇区数更多。`);
    g.appendChild(c);
  }

  // Sectors (3 zones, ZBR — 外圈扇区多，内圈扇区少)
  const showTracks = [3, 7, 11]; // 内 → 中 → 外
  const zoneData = [
    { label: 'Zone N (内圈)', n: 8,  color: '#58a6ff' },
    { label: 'Zone 1 (中圈)', n: 12, color: '#58a6ff' },
    { label: 'Zone 0 (外圈)', n: 16, color: '#58a6ff' },
  ];

  showTracks.forEach((tIdx, zi) => {
    const r = tracks[tIdx];
    const zd = zoneData[zi];
    const { n, label, color } = zd;
    const startA = -Math.PI / 2 + 0.02;
    const span = Math.PI * 2 - 0.04;
    const ri = r - 6, ro = r + 6;

    for (let si = 0; si < n; si++) {
      const a1 = startA + span * (si / n);
      const a2 = startA + span * ((si + 1) / n);
      const d = [
        `M ${CX + Math.cos(a1) * ri} ${CY + Math.sin(a1) * ri}`,
        `A ${ri} ${ri} 0 0 1 ${CX + Math.cos(a2) * ri} ${CY + Math.sin(a2) * ri}`,
        `L ${CX + Math.cos(a2) * ro} ${CY + Math.sin(a2) * ro}`,
        `A ${ro} ${ro} 0 0 0 ${CX + Math.cos(a1) * ro} ${CY + Math.sin(a1) * ro}`, 'Z'
      ].join(' ');

      const p = SVG('path', {
        d, class: 'hover-arc',
        fill: color, 'fill-opacity': '0.55',
        stroke: '#58a6ff', 'stroke-width': '0.8'
      });
      bindTip(p, `<div class="tt-label">${label} · 扇区 #${si}</div>
物理扇区: 4096 字节 (4K Advanced Format)<br>
典型每磁道扇区数: ${zi === 0 ? '~1200' : zi === 1 ? '~900' : '~500'}<br>
<span style="color:#8b949e;">磁头旋转到此角度时读写该数据段</span>`);
      p.addEventListener('mouseenter', () => {
        platterInfo.innerHTML = `<span class="hl">${label}</span> · 扇区 #${si}<br>
<span style="color:#8b949e;">4K 物理扇区（Advanced Format）。磁头沿磁道旋转到此角度时读写。扇区之间有 Gap 分隔。</span>`;
      });
      g.appendChild(p);
    }
  });

  // ZBR labels (外圈→内圈)
  [
    { r: 0.85, text: 'Zone 0 (外圈) ~1200 扇区/道' },
    { r: 0.55, text: 'Zone 1 (中圈) ~900 扇区/道'  },
    { r: 0.28, text: 'Zone N (内圈) ~500 扇区/道'  },
  ].forEach(l => {
    const rr = IR + (OR - IR) * l.r;
    g.appendChild(SVG('text', {
      x: CX + 15, y: CY - rr,
      fill: '#58a6ff', 'font-size': '10', 'font-family': 'monospace'
    })).textContent = l.text;
  });

  // Spindle
  g.appendChild(SVG('circle', {cx: CX, cy: CY, r: IR - 10, fill: '#0d1117', stroke: '#21262d'}));
  g.appendChild(SVG('circle', {cx: CX, cy: CY, r: 12, fill: '#30363d'}));
  g.appendChild(SVG('text', {
    x: CX, y: OR + 20,
    fill: '#8b949e', 'font-size': '10', 'text-anchor': 'middle'
  })).textContent = '← 外圈 | 内圈 →  旋转: 逆时针';

  platterSvg.appendChild(g);
}

// ---- Sector Detail ----
function drawSectorDetail() {
  const g = SVG('g');
  const segs = [
    { label: 'Preamble',  w: 50, c: '#1f6feb', d: '同步信号，PLL 锁相环锁定读取时钟相位' },
    { label: 'Sector Mark', w: 40, c: '#1f6feb', d: '扇区号标识（格雷码编码的 LBA 地址）' },
    { label: 'ECC (前)',   w: 45, c: '#3fb950', d: '前置纠错码，校验元数据完整性' },
    { label: 'Data (4KB)', w: 180, c: '#d29922', d: '用户数据。物理 4096B，逻辑仍暴露 512B（512e 模拟，固件 RMW）' },
    { label: 'ECC (后)',   w: 55, c: '#3fb950', d: '后置纠错码 Reed-Solomon/LDPC，检测和修复读取错误' },
    { label: 'Gap',        w: 30, c: '#8b949e', d: '扇区间隙，允许磁头切换时序容差' },
  ];

  let x = 10;
  const y = 25, h = 70;

  segs.forEach(s => {
    const r = SVG('rect', {
      x, y, width: s.w, height: h, rx: '2', class: 'hover-segment',
      fill: s.c, 'fill-opacity': '0.6', stroke: s.c, 'stroke-width': '1'
    });
    bindTip(r, `<div class="tt-label">${s.label}</div><div style="font-size:11px;">${s.d}</div>`);
    g.appendChild(r);

    const lbl = s.label.replace(' ', '\n');
    const lines = lbl.split('\n');
    lines.forEach((t, i) => {
      g.appendChild(SVG('text', {
        x: x + s.w / 2, y: y + h / 2 - (lines.length - 1) * 7 + i * 14 + 4,
        'text-anchor': 'middle', fill: '#fff', 'font-size': '10', 'font-family': 'monospace'
      })).textContent = t;
    });

    g.appendChild(SVG('text', {
      x: x + s.w / 2, y: y + h + 15,
      'text-anchor': 'middle', fill: '#8b949e', 'font-size': '9'
    })).textContent = s.w < 50 ? '←→' : '← 磁头扫描方向 →';
    x += s.w;
  });

  g.appendChild(SVG('text', {
    x: 200, y: 115,
    'text-anchor': 'middle', fill: '#8b949e', 'font-size': '11', 'font-family': 'monospace'
  })).textContent = '一个物理扇区完整结构 — 4KB 数据 + 元数据 ≈ 4.5KB';

  detailSvg.appendChild(g);
}

// ---- I/O Path ----
function drawPath() {
  const g = SVG('g');
  const stages = [
    { title: '磁盘物理', color: '#58a6ff', detail: '物理扇区<br>512B × 8 = 4KB<br>LBA 线性寻址', isSectors: true },
    { title: '块层适配', color: '#d29922', detail: 'struct bio<br>bi_sector 以 512B 为单位<br>bio→request 合并调度' },
    { title: '文件系统', color: '#3fb950', detail: '文件系统块<br>sb_blocksize=4096<br>ext4 block=8 sectors' },
    { title: '页缓存',   color: '#f0883e', detail: 'struct page<br>PAGE_SIZE=4096<br>Page Cache 缓存单位' },
    { title: '应用',     color: '#f0f6fc', detail: 'read(fd, buf, 4096)<br>连续字节流<br>不感知底层分块' },
  ];

  const W = 1200, SW = W / stages.length, SY = 30, BY = 50, BH = 60;
  const BW = Math.min(SW * 0.55, 110);

  // Arrow marker
  const defs = SVG('defs');
  defs.innerHTML = '<marker id="arr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#58a6ff"/></marker>';
  g.appendChild(defs);

  stages.forEach((s, i) => {
    const cx = SW * i + SW / 2, bx = cx - BW / 2, by = BY + 10;

    g.appendChild(SVG('text', {
      x: cx, y: SY, 'text-anchor': 'middle', fill: '#8b949e',
      'font-size': '11', 'font-family': 'monospace'
    })).textContent = s.title;

    if (s.isSectors) {
      const cols = 2, rows = 4, sw = BW / cols - 2, sh = BH / rows - 2;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const idx = r * cols + c;
          const rect = SVG('rect', {
            x: bx + c * (sw + 2) + 1, y: by + r * (sh + 2) + 1,
            width: sw, height: sh, rx: '1', class: 'hover-box',
            fill: '#58a6ff', 'fill-opacity': '0.6', stroke: '#58a6ff', 'stroke-width': '0.5'
          });
          bindTip(rect, `<div class="tt-label">Sector ${idx}</div>LBA: ${idx}<br>大小: 512 字节<br>块层 I/O 基本单位`);
          g.appendChild(rect);
        }
      }
    } else {
      const rect = SVG('rect', {
        x: bx, y: by, width: BW, height: BH, rx: '6', class: 'hover-box',
        fill: s.color, 'fill-opacity': '0.3', stroke: s.color, 'stroke-width': '1.5'
      });
      bindTip(rect, `<div class="tt-label">${s.title}</div>${s.detail}`);
      g.appendChild(rect);
    }

    g.appendChild(SVG('text', {
      x: cx, y: by + BH / 2 + 4,
      'text-anchor': 'middle', fill: '#fff', 'font-size': '11', 'font-family': 'monospace'
    })).textContent = s.title === '应用' ? 'read()' : s.title === '块层适配' ? 'bio' : s.title;

    // Note
    const notes = {
      '磁盘物理': '磁盘以 512B sector 寻址',
      '块层适配': 'io scheduler 合并拆分',
      '文件系统': 'ext4 block = 4KB',
      '页缓存': '1 page = 1 block',
      '应用': 'read(fd, buf, 4096)',
    };
    g.appendChild(SVG('text', {
      x: cx, y: by + BH + 20,
      'text-anchor': 'middle', fill: '#8b949e', 'font-size': '9', 'font-family': 'monospace'
    })).textContent = notes[s.title];

    // Arrow
    if (i < stages.length - 1) {
      g.appendChild(SVG('line', {
        x1: cx + BW / 2 + 5, y1: by + BH / 2,
        x2: SW * (i + 1) + SW / 2 - Math.min(SW * 0.55 / 2, 55) - 5,
        y2: by + BH / 2,
        stroke: '#58a6ff', 'stroke-width': '1.5', 'marker-end': 'url(#arr)'
      }));
    }
  });

  // Dimension bar
  const dims = ['512B', '4KB (8 sectors)', '4KB', '4KB', '4KB'];
  const dimY = 160;
  stages.forEach((s, i) => {
    const cx = SW * i + SW / 2;
    g.appendChild(SVG('text', {
      x: cx, y: dimY, 'text-anchor': 'middle',
      fill: '#f0883e', 'font-size': '11', 'font-weight': 'bold', 'font-family': 'monospace'
    })).textContent = dims[i];
  });
  g.appendChild(SVG('line', {x1: 10, y1: 173, x2: W - 10, y2: 173, stroke: '#30363d'}));

  pathSvg.appendChild(g);
}

drawPlatter();
drawSectorDetail();
drawPath();

})();
</script>

</body>
</html>
